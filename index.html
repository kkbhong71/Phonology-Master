async function gasCall(action, p) {
  if (!GAS) return null;
  var params = Object.assign({action: action}, p || {});
  var qs = Object.keys(params).map(function(k){ return k + '=' + encodeURIComponent(params[k]); }).join('&');

}

/* ═══ 분석기 ═══ */
function Analyzer() {
  const [inp, setInp] = useState("");
  const [res, setRes] = useState(null);
  const [loading, setLoading] = useState(false);
  const [isAI, setIsAI] = useState(false);
  const [animStep, setAnimStep] = useState(-1);

  async function run() {
    var w = inp.trim(); if (!w) return;
    setRes(null); setLoading(true); setIsAI(false); setAnimStep(-1);
    if (DB[w]) {
      var d = DB[w];
      setRes({w:w, p:d.p, ty:d.ty, sub:d.sub, st:d.st, law:d.law});
      d.st.forEach(function(_, i) { setTimeout(function(){setAnimStep(i)}, (i+1)*350); });
      setLoading(false); return;
    }
    if (GAS) {
      setIsAI(true);
      var r = await gasCall("analyze", {word: w});
      if (r && r.ok && r.data) {
        var result = {w:w, p:r.data.pronunciation, ty:r.data.type, sub:r.data.subType, st:r.data.steps||[], law:r.data.law, exp:r.data.explanation};
        setRes(result);
        (result.st||[]).forEach(function(_, i) { setTimeout(function(){setAnimStep(i)}, (i+1)*350); });
      } else if (r && r.ok && r.text) {
        setRes({w:w, txt:r.text});
      } else {
        setRes({w:w, none:true});
      }
    } else {
      setRes({w:w, none:true, noGas:true});
    }
    setLoading(false);
  }

  var quicks = ["굽는","원리","같이","막국수","파랗다","아파","꽃만","깨끗한","등산로","축하","놓고","논리"];

  return (
    <div className="ctn" style={{paddingTop:"20px", maxWidth:"760px"}}>
      <h2 style={{fontWeight:800, fontSize:"1.4rem", marginBottom:"5px"}}>🔬 음운 변동 분석기</h2>
      <p style={{color:"var(--t2)", fontSize:".87rem", marginBottom:"16px"}}>단어를 입력하면 변동 과정을 분석합니다.{GAS ? " 모든 단어 AI 분석 가능!" : ""}</p>
      <div className="cd" style={{marginBottom:"16px"}}>
        <div style={{display:"flex", gap:"8px", marginBottom:"10px"}}>
          <input className="inp" value={inp} onChange={function(e){setInp(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter")run()}} placeholder="분석할 단어 (예: 굽는, 꽃만)" style={{flex:1}} />
          <button className="btn bm" onClick={run} disabled={loading}>{loading ? "분석중..." : "분석 🔍"}</button>
        </div>
        <div style={{display:"flex", flexWrap:"wrap", gap:"4px"}}>
          {quicks.map(function(w) { return <button key={w} className="btn bx bg2" style={{border:"1px solid var(--bd)"}} onClick={function(){setInp(w)}}>{w}</button>; })}
        </div>
      </div>
      {loading && <div className="cd" style={{textAlign:"center", padding:"32px"}}><div className="ld"><span></span><span></span><span></span></div><p style={{color:"var(--t3)", marginTop:"8px"}}>AI 분석 중...</p></div>}
      {res && !res.none && !res.txt && (
        <div className="cd au">
          <div style={{display:"flex", justifyContent:"space-between", flexWrap:"wrap", gap:"6px", marginBottom:"12px"}}>
            <div>
              <h3 style={{fontWeight:800, fontSize:"1.2rem"}}>{res.w} → [{res.p}]</h3>
              <div style={{display:"flex", gap:"5px", marginTop:"5px", flexWrap:"wrap"}}>
                <span className={"ba " + badgeClass(res.ty)}>{res.ty}</span>
                <span className="ba b-m">{res.sub}</span>
                {isAI && <span className="ba b-v">🤖 AI</span>}
              </div>
            </div>
            <span style={{fontSize:".77rem", color:"var(--t3)"}}>📜 {res.law}</span>
          </div>
          {res.exp && <p style={{fontSize:".86rem", color:"var(--t2)", padding:"10px 12px", background:"var(--bg2)", borderRadius:"var(--r)", marginBottom:"10px", lineHeight:1.6}}>{res.exp}</p>}
          <h4 style={{fontWeight:600, color:"var(--md)", fontSize:".87rem", marginBottom:"7px"}}>변동 과정</h4>
          {(res.st || []).map(function(s, i) {
            return (
              <div key={i} className="st" style={{opacity: animStep >= i ? 1 : 0.15, transform: animStep >= i ? "none" : "translateX(-5px)", transition:"all .3s"}}>
                <span className="sf">{s.f || s.from}</span><span className="sa">→</span><span className="stt">{s.t || s.to}</span><span className="sr">{s.r || s.rule}</span>
              </div>
            );
          })}
        </div>
      )}
      {res && res.txt && <div className="cd au"><span className="ba b-v" style={{marginBottom:"8px"}}>🤖 AI 분석</span><div style={{whiteSpace:"pre-wrap", lineHeight:1.7, fontSize:".9rem"}}>{res.txt}</div></div>}
      {res && res.none && <div className="cd au" style={{textAlign:"center", padding:"24px"}}><span style={{fontSize:"1.5rem"}}>🤔</span><p style={{color:"var(--t2)", marginTop:"6px"}}>"{res.w}" 분석 결과 없음</p>{res.noGas && <p style={{fontSize:".82rem", color:"var(--t3)", marginTop:"4px"}}>config.js에 GAS URL 설정→AI 분석 가능</p>}</div>}
    </div>
  );
}

/* ═══ 퀴즈 ═══ */
function QuizPage() {
  const [ci, setCi] = useState(0);
  const [sel, setSel] = useState(null);
  const [done, setDone] = useState(false);
  const [score, setScore] = useState(0);
  const [finished, setFinished] = useState(false);
  const [log, setLog] = useState([]);
  const [filter, setFilter] = useState("all");

  var qs = filter === "all" ? QZ : QZ.filter(function(q){ return q.s === (filter === "음운" ? "음운" : "문법"); });
  var q = qs[ci];

  function pick(i) { if (done) return; setSel(i); setDone(true); if (i === q.a) setScore(function(s){return s+1}); setLog(function(l){return l.concat([{id:q.id, ok:i===q.a}])}); }
  function next() { if (ci + 1 >= qs.length) setFinished(true); else { setCi(function(c){return c+1}); setSel(null); setDone(false); } }
  function reset() { setCi(0); setSel(null); setDone(false); setScore(0); setFinished(false); setLog([]); }

  if (finished) {
    var pct = Math.round(score / qs.length * 100);
    var wrongs = log.filter(function(l){return !l.ok}).map(function(l){return qs.find(function(q2){return q2.id===l.id})}).filter(Boolean);
    return (
      <div className="ctn" style={{paddingTop:"28px", maxWidth:"560px", textAlign:"center"}}>
        <div className="cd au">
          <div style={{fontSize:"2.5rem", marginBottom:"8px"}}>{pct >= 80 ? "🎉" : pct >= 60 ? "👍" : "📚"}</div>
          <h2 style={{fontWeight:800, fontSize:"1.4rem"}}>퀴즈 완료!</h2>
          <div style={{fontSize:"1.8rem", fontWeight:900, color:"var(--mint)", margin:"6px 0"}}>{score}/{qs.length}</div>
          <div className="pb" style={{marginBottom:"14px"}}><div style={{width: pct + "%"}}></div></div>
          <p style={{color:"var(--t2)", marginBottom:"18px"}}>{pct >= 80 ? "훌륭! 🎉" : pct >= 60 ? "잘했어요!" : "다시 도전!"}</p>
          {wrongs.length > 0 && (
            <div style={{textAlign:"left", marginBottom:"14px"}}>
              <h4 style={{fontWeight:700, color:"var(--rose)", marginBottom:"7px", fontSize:".88rem"}}>❌ 틀린 문제</h4>
              {wrongs.map(function(w, i) {
                return (
                  <div key={i} style={{background:"var(--bg2)", padding:"10px", borderRadius:"var(--r)", marginBottom:"5px", fontSize:".84rem"}}>
                    <div style={{fontWeight:600}}>{w.q}</div>
                    <div style={{color:"var(--emerald)", marginTop:"2px"}}>✅ {w.o[w.a]}</div>
                    <div style={{color:"var(--t3)", marginTop:"1px"}}>{w.e}</div>
                  </div>
                );
              })}
            </div>
          )}
          <button className="btn bm" onClick={reset}>다시 도전 🔄</button>
        </div>
      </div>
    );
  }

  if (!q) return null;

  return (
    <div className="ctn" style={{paddingTop:"20px", maxWidth:"640px"}}>
      <h2 style={{fontWeight:800, fontSize:"1.4rem", marginBottom:"10px"}}>✏️ 실력 점검 퀴즈</h2>
      <div style={{display:"flex", gap:"5px", marginBottom:"16px"}}>
        {["all","음운","문법"].map(function(f) { return <button key={f} className={"btn bs " + (filter === f ? "bm" : "bo")} onClick={function(){setFilter(f);reset()}}>{f === "all" ? "전체" : f === "음운" ? "음운 변동" : "문법 요소"}</button>; })}
      </div>
      <div style={{display:"flex", justifyContent:"space-between", marginBottom:"6px"}}>
        <span className="ba b-s">Q{ci+1}/{qs.length}</span>
        <span className="ba b-e">점수 {score}</span>
      </div>
      <div className="pb" style={{marginBottom:"16px"}}><div style={{width: (ci / qs.length * 100) + "%"}}></div></div>
      <div className="cd au" key={q.id}>
        <div style={{display:"flex", gap:"4px", marginBottom:"8px"}}>
          <span className="ba b-v">{q.s === "음운" ? "음운변동" : "문법요소"}</span>
          <span className="ba b-m">{q.c}</span>
        </div>
        <h3 style={{fontWeight:700, fontSize:"1rem", marginBottom:"14px", lineHeight:1.65}}>{q.q}</h3>
        {q.o.map(function(opt, i) {
          var cls = "qo" + (done ? " dn" : "") + (done && i === q.a ? " ok" : "") + (done && sel === i && i !== q.a ? " ng" : "");
          return <button key={i} onClick={function(){pick(i)}} className={cls}><span style={{fontWeight:700, marginRight:"6px", opacity:.35}}>{"①②③④"[i]}</span>{opt}</button>;
        })}
        {done && (
          <div className="au" style={{marginTop:"12px", padding:"12px", background: sel === q.a ? "var(--el)" : "var(--rl)", borderRadius:"var(--r)", border:"1px solid " + (sel === q.a ? "var(--emerald)" : "var(--rose)")}}>
            <b style={{color: sel === q.a ? "var(--emerald)" : "var(--rose)"}}>{sel === q.a ? "✅ 정답!" : "❌ 오답"}</b>
            <p style={{fontSize:".86rem", lineHeight:1.6, marginTop:"3px"}}>{q.e}</p>
          </div>
        )}
        {done && <div style={{marginTop:"10px", textAlign:"right"}}><button className="btn bm" onClick={next}>{ci + 1 >= qs.length ? "결과보기" : "다음 →"}</button></div>}
      </div>
    </div>
  );
}

/* ═══ AI 채팅 ═══ */
function ChatPage() {
  const [msgs, setMsgs] = useState([{r:"a", t:"안녕하세요! 📖 국어 문법 AI 튜터입니다.\n\n3단원 내용에 대해 무엇이든 질문해 주세요!"}]);
  const [inp, setInp] = useState("");
  const [busy, setBusy] = useState(false);
  const ref = useRef(null);

  useEffect(function() { if (ref.current) ref.current.scrollTop = ref.current.scrollHeight; }, [msgs]);

  async function send() {
    if (!inp.trim() || busy) return;
    var q = inp.trim(); setInp(""); setBusy(true);
    setMsgs(function(m) { return m.concat([{r:"u", t:q}]); });

    var wm = Object.keys(DB).find(function(w) { return q.indexOf(w) >= 0; });
    if (wm) {
      var d = DB[wm];
      var a = "📝 \"" + wm + "\" 분석:\n발음: [" + d.p + "] | " + d.ty + "(" + d.sub + ") | " + d.law + "\n\n";
      d.st.forEach(function(s, i) { a += (i+1) + ". " + s.f + " → " + s.t + " (" + s.r + ")\n"; });
      setMsgs(function(m) { return m.concat([{r:"a", t:a}]); });
    }

    if (GAS) {
      var r = await gasCall("chat", {q: q});
      if (r && r.ok) { setMsgs(function(m) { return m.concat([{r:"a", t:r.answer}]); }); }
      else if (!wm) { setMsgs(function(m) { return m.concat([{r:"a", t:"⚠️ 응답 실패. GAS 배포 상태를 확인해 주세요."}]); }); }
    } else if (!wm) {
      setMsgs(function(m) { return m.concat([{r:"a", t:"⚠️ AI 사용하려면:\n1️⃣ Code.gs를 GAS에 배포\n2️⃣ config.js에 GAS URL 입력\n\n분석기에서 교과서 예시는 바로 확인 가능!"}]); });
    }
    setBusy(false);
  }

  var quickQs = ["\"굽는\"에서 왜 비음화?","구개음화 조건이 뭐야?","피동표현 효과는?","높임표현 종류"];

  return (
    <div className="ctn" style={{paddingTop:"20px", maxWidth:"720px"}}>
      <h2 style={{fontWeight:800, fontSize:"1.4rem", marginBottom:"8px"}}>🤖 AI 문법 튜터</h2>
      {!GAS && <div style={{marginBottom:"10px", padding:"10px 12px", background:"var(--al)", borderRadius:"var(--r)", fontSize:".82rem", color:"#92400e", border:"1px solid var(--amber)"}}>⚠️ Code.gs → GAS 배포 → config.js에 URL 입력 (API 키는 GAS에 안전 보관)</div>}
      <div style={{display:"flex", flexWrap:"wrap", gap:"4px", marginBottom:"8px"}}>
        {quickQs.map(function(q, i) { return <button key={i} className="btn bx bg2" style={{border:"1px solid var(--bd)"}} onClick={function(){setInp(q)}}>{q}</button>; })}
      </div>
      <div className="cb">
        <div className="cms" ref={ref}>
          {msgs.map(function(m, i) {
            return <div key={i} className={"bu " + (m.r === "u" ? "u" : "ai") + " au"}><div style={{whiteSpace:"pre-wrap"}}>{m.t}</div></div>;
          })}
          {busy && <div className="bu ai"><span className="ld"><span></span><span></span><span></span></span> 생각 중...</div>}
        </div>
        <div className="cft">
          <input className="inp" value={inp} onChange={function(e){setInp(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter")send()}} placeholder="문법 질문을 입력하세요..." style={{flex:1}} />
          <button className="btn bm" onClick={send} disabled={busy}>전송</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
